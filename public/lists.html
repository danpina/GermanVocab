<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>All Lists — German Vocab Helper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <nav class="top-nav">
      <h1>All Lists</h1>
      <div class="nav-links">
        <a href="index.html">← Back to today</a>
        <a href="settings.html">⚙️ Settings</a>
        <span id="userBar" class="user-bar"></span>
      </div>
    </nav>
    <p class="subtitle">Everything you've saved, grouped by the day you saved it.</p>

    <section class="lookup">
      <h2>Add words in bulk</h2>
      <p class="muted">One pair per line, separated by a colon: <code>word : translation</code></p>
      <textarea id="bulkInput" rows="6" placeholder="Hund : dog&#10;Katze : cat&#10;guten Morgen : good morning"></textarea>
      <div class="buttons">
        <button id="bulkAddBtn">Add these words</button>
      </div>
      <p id="bulkError" class="error hidden"></p>
      <p id="bulkSuccess" class="empty hidden"></p>
    </section>

    <div class="list-header">
      <span id="totalCount" class="muted"></span>
      <button id="exportAllBtn">Export all as CSV</button>
    </div>

    <div id="lists"></div>
    <p id="emptyMessage" class="empty hidden">Nothing saved yet. Go look up some words!</p>
  </main>

  <script src="languages.js"></script>
  <script src="common.js"></script>
  <script src="lists.js"></script>
</body>
</html>
