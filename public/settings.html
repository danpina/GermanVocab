<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings — German Vocab Helper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <nav class="top-nav">
      <h1>Settings</h1>
      <div class="nav-links">
        <a href="index.html">← Back to today</a>
        <span id="userBar" class="user-bar"></span>
      </div>
    </nav>
    <p class="subtitle">Choose which language you're learning and which one you want translations in.</p>

    <form id="settingsForm" class="lookup auth-form">
      <label for="inputLang">I'm learning</label>
      <select id="inputLang" name="inputLang"></select>

      <label for="outputLang">Translate into</label>
      <select id="outputLang" name="outputLang"></select>

      <button id="saveBtn" type="submit">Save</button>
      <p id="error" class="error hidden"></p>
      <p id="saved" class="empty hidden">Saved.</p>
    </form>
  </main>

  <script src="languages.js"></script>
  <script src="common.js"></script>
  <script src="settings.js"></script>
</body>
</html>
